<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MysticElodie</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body>
  
		<img id="title" src="title.png" alt="New Love City">
		
        <p id="MOTD">Hello!</p>
        
        <script type="text/javascript">
            var motd = [
            	'Huh? Whuh?',
            	'Everything will be okay.',
            	'Home of the world\'s most normal girl',
            	'LUCK 10 INTELLIGENCE 1',
            	'WELCOME to ON-LINE',
            	'I\'m calling out, but can you hear me?',
            	'Hello, to life, to everything'
            ];
            var message = motd[Math.floor(Math.random() * motd.length)];
            let text = document.getElementById("MOTD").innerHTML; 
            document.getElementById("MOTD").innerHTML = text.replace("Hello!", message);
        </script>
  </body>
</html>
